<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numberle</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.cdnfonts.com/css/commodore-64" rel="stylesheet">
    <link rel="icon" type="image/png" href="numberle favicon new.png">
</head>
<body>
    <h1>Numberle</h1>
    <p>Guess the 5-digit number!</p>
    <div id="board"></div>
    <input id="guessInput" maxlength="5" placeholder="Enter 5 numbers" />
    <button id="guessBtn" onclick="submitGuess()">Guess</button>
    <button id="restartBtn" onclick="restartGame()" style="display:none;">
        Retry
    </button>
    <p id="message"></p>
    <script src="script.js"></script>
</body>
</html>
